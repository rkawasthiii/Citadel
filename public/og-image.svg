<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Clean, minimal OG image matching the app's aesthetic -->
  
  <!-- White/light background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  
  <!-- Main content centered -->
  <g transform="translate(600, 290)">
    <!-- Logo text "Feeds" in Billabong cursive style -->
    <text x="0" y="0" 
          font-family="Billabong, 'Brush Script MT', cursive" 
          font-size="160" 
          fill="#000000" 
          text-anchor="middle"
          dominant-baseline="middle">Feeds</text>
    
    <!-- Tagline below -->
    <text x="0" y="90" 
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
          font-size="32" 
          font-weight="400"
          fill="#737373" 
          text-anchor="middle">Discover research papers, your way</text>
  </g>
  
  <!-- Subtle bottom border -->
  <rect x="0" y="620" width="1200" height="10" fill="#f5f5f5"/>
</svg>
